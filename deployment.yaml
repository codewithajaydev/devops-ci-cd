apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-app
        image: ajaybecse03/devops-cicd:22   # ✅ your DockerHub image
        ports:
        - containerPort: 8080   # ✅ FIXED